global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: 'sample_monitoring'
    scrape_interval: 5s
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets:
          - 'calculator:8080'
          - 'deal:8081'
          - 'statement:8082'
          - 'gateway:8888'
          - 'dossier:8083'

rule_files:
  - '/etc/prometheus/prometheus_rules.yml'