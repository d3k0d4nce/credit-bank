spring:
  application:
    name: calculator

base:
  interest:
    rate: 15
insurance:
  cost: 100000
  discount: 3
salary:
  client:
    discount: 1

server:
  port: 8080

springdoc:
  swagger-ui:
    url: /openapi.yaml

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus
  metrics:
    export:
      prometheus:
        enabled: true
    distribution:
      percentiles-histogram:
        "[http.server.requests]": true
