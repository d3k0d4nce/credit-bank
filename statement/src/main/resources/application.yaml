server:
  port: 8082

springdoc:
  swagger-ui:
    url: /openapi.yaml

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus
  metrics:
    export:
      prometheus:
        enabled: true
    distribution:
      percentiles-histogram:
        "[http.server.requests]": true

other:
  service:
    url:
      deal: ${DEAL_SERVICE:http://localhost:8081/deal}
